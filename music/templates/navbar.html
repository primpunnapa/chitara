<header style="background: white; border-bottom: 1px solid hsl(210 20% 90%); position: sticky; top: 0; z-index: 100; width: 100%;">
    <div style="display: flex; align-items: center; justify-content: space-between; max-width: 80rem; margin: 0 auto; padding: 0.875rem 1.5rem;">
        
        <!-- Left: Logo -->
        <a href="{% url 'music:landing' %}" style="display: flex; align-items: center; gap: 0.5rem; text-decoration: none; color: inherit;">
            <div style="width: 32px; height: 32px; background: linear-gradient(135deg, hsl(215 75% 60%), hsl(225 70% 50%)); border-radius: 8px; display: flex; align-items: center; justify-content: center;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 18V5l12-2v13"></path>
                    <circle cx="6" cy="18" r="3"></circle>
                    <circle cx="18" cy="16" r="3"></circle>
                </svg>
            </div>
            <span style="font-size: 1.125rem; font-weight: 600; color: hsl(210 50% 10%);">Chitara</span>
        </a>

        <!-- Right: Navigation -->
        <nav style="display: flex; align-items: center; gap: 0.25rem;">
            {% if user.is_authenticated %}
                <a href="{% url 'music:library' %}" style="display: flex; align-items: center; gap: 0.5rem; text-decoration: none; color: hsl(210 20% 35%); font-size: 0.875rem; font-weight: 500; padding: 0.5rem 0.75rem; border-radius: 8px; transition: background 0.2s, color 0.2s;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                    </svg>
                    Library
                </a>
                <a href="{% url 'music:generate_song' %}" style="display: flex; align-items: center; gap: 0.5rem; text-decoration: none; color: hsl(210 20% 35%); font-size: 0.875rem; font-weight: 500; padding: 0.5rem 0.75rem; border-radius: 8px; transition: background 0.2s, color 0.2s;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
                    </svg>
                    Generate
                </a>
                <a href="/accounts/logout/" style="display: flex; align-items: center; gap: 0.5rem; text-decoration: none; color: hsl(210 20% 35%); font-size: 0.875rem; font-weight: 500; padding: 0.5rem 0.75rem; border-radius: 8px; transition: background 0.2s, color 0.2s;">
                    <!-- Google icon -->
                    <svg width="16" height="16" viewBox="0 0 48 48">
                        <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.2 7.9 3l5.7-5.7C34 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.3-.4-3.5z"/>
                        <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16 19 13 24 13c3.1 0 5.8 1.2 7.9 3l5.7-5.7C34 6.1 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
                        <path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.5-5.2l-6.2-5.3C29.2 35 26.7 36 24 36c-5.2 0-9.6-3.3-11.3-8l-6.5 5C9.5 39.6 16.2 44 24 44z"/>
                        <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.3-4.2 5.7l6.2 5.3C40.9 36.1 44 30.6 44 24c0-1.3-.1-2.3-.4-3.5z"/>
                    </svg>
                    Sign out
                </a>
            {% else %}
                <a href="{% url 'music:login' %}" style="display: flex; align-items: center; gap: 0.5rem; text-decoration: none; color: black; font-size: 0.875rem; font-weight: 500;">
                    <svg width="16" height="16" viewBox="0 0 48 48">
                        <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.2 7.9 3l5.7-5.7C34 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.3-.4-3.5z"/>
                        <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16 19 13 24 13c3.1 0 5.8 1.2 7.9 3l5.7-5.7C34 6.1 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
                        <path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.5-5.2l-6.2-5.3C29.2 35 26.7 36 24 36c-5.2 0-9.6-3.3-11.3-8l-6.5 5C9.5 39.6 16.2 44 24 44z"/>
                        <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.3-4.2 5.7l6.2 5.3C40.9 36.1 44 30.6 44 24c0-1.3-.1-2.3-.4-3.5z"/>
                    </svg>
                    Sign in
                </a>
            {% endif %}
        </nav>
    </div>

    <style>
        nav a:hover {
            background: hsl(210 30% 95%);
            color: hsl(215 75% 50%);
        }
    </style>
</header>
