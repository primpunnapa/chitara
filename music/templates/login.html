<!DOCTYPE html>
{% load socialaccount %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Chitara</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz@9..144&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: hsl(210 60% 98%);
            --gradient-hero: radial-gradient(ellipse at 20% 50%, hsl(215 75% 65%), hsl(225 70% 55%));
            --gradient-primary: linear-gradient(135deg, hsl(215 75% 65%), hsl(225 70% 55%));
            --glass-bg: hsl(0 0% 100% / 0.65);
            --glass-blur: backdrop-filter: blur(16px);
            --border-light: hsl(210 100% 80% / 0.5);
            --text-primary: hsl(210 50% 10%);
            --text-secondary: hsl(210 20% 40%);
            --text-tertiary: hsl(210 15% 60%);
            --shadow-soft: 0 10px 40px hsl(0 0% 0% / 0.08);
            --shadow-glow: 0 20px 60px hsl(0 0% 0% / 0.12);
            --shadow-card: 0 4px 20px hsl(0 0% 0% / 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--gradient-hero);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            color: var(--text-primary);
        }

        .login-wrapper {
            width: 100%;
            max-width: 28rem;
            animation: fadeUp 0.6s ease-out;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: var(--shadow-soft);
            border: 1px solid var(--border-light);
        }

        .login-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin-bottom: 2rem;
        }

        .icon-circle {
            height: 3.5rem;
            width: 3.5rem;
            border-radius: 0.5rem;
            background: var(--gradient-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-glow);
            margin-bottom: 1rem;
        }

        .icon-circle svg {
            width: 1.75rem;
            height: 1.75rem;
            color: white;
        }

        .login-header h1 {
            font-family: 'Fraunces', serif;
            font-size: 1.875rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            font-size: 0.875rem;
            color: var(--text-tertiary);
        }

        .google-button {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 0.875rem 1.5rem;
            border-radius: 0.875rem;
            background: white;
            border: 1px solid hsl(210 30% 80%);
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            text-decoration: none;
        }

        .google-button:hover {
            border-color: hsl(215 75% 65% / 0.4);
            box-shadow: var(--shadow-card);
        }

        .google-button:active {
            transform: scale(0.98);
        }

        .google-button svg {
            width: 1.25rem;
            height: 1.25rem;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin: 1.5rem 0;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: hsl(210 30% 80%);
        }

        .divider-text {
            font-size: 0.75rem;
            color: var(--text-tertiary);
        }

        .terms {
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-tertiary);
            line-height: 1.5;
        }

        @media (max-width: 640px) {
            .glass {
                padding: 1.5rem;
            }

            .login-header h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="glass">
            <!-- Header -->
            <div class="login-header">
                <div class="icon-circle">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="5" r="1"></circle>
                        <path d="M6 12c-1-0-2-1-2-2s1-2 2-2 2 1 2 2-1 2-2 2z"></path>
                        <path d="M18 12c-1 0-2-1-2-2s1-2 2-2 2 1 2 2-1 2-2 2z"></path>
                        <path d="M9 21H7a2 2 0 0 1-2-2v-1h4v3z"></path>
                        <path d="M15 21h2a2 2 0 0 0 2-2v-1h-4v3z"></path>
                        <path d="M9 9l6 7"></path>
                        <path d="M15 9l-6 7"></path>
                    </svg>
                </div>
                <h1>Welcome</h1>
                <p>Sign in to start composing</p>
            </div>

            <!-- Google Login Button -->
             {% load socialaccount %}
            <a href="{% provider_login_url 'google' %}" class="google-button">
                <svg width="20" height="20" viewBox="0 0 48 48">
                    <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.2 7.9 3l5.7-5.7C34 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.3-.4-3.5z"/>
                    <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16 19 13 24 13c3.1 0 5.8 1.2 7.9 3l5.7-5.7C34 6.1 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
                    <path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.5-5.2l-6.2-5.3C29.2 35 26.7 36 24 36c-5.2 0-9.6-3.3-11.3-8l-6.5 5C9.5 39.6 16.2 44 24 44z"/>
                    <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.3-4.2 5.7l6.2 5.3C40.9 36.1 44 30.6 44 24c0-1.3-.1-2.3-.4-3.5z"/>
                </svg>
                Continue with Google
            </a>
            <!-- Divider -->
            <div class="divider">
                <div class="divider-line"></div>
            </div>

            <!-- Terms -->
            <p class="terms">
                By continuing you agree to our Terms and Privacy Policy.
            </p>
        </div>
    </div>
</body>
</html>
